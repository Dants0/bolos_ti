services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: admin                 
      POSTGRES_PASSWORD: admin              
      POSTGRES_DB: bolos                    
    ports:
      - "5432:5432"                        
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:latest
    command: redis-server --requirepass aloisk  # Opcional: adiciona senha
    ports:
      - "6379:6379"                       # Porta local:porta do container
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
